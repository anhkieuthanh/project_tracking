services:
  postgres:
    image: postgres:16
    container_name: weekly-tracking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: weekly_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
